<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            color: white;
            overflow: hidden;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 520px;
            width: 440px;
            padding: 16px;
            gap: 14px;
        }

        #messages-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Dark Smoked Volumetric Glass Capsule Enhanced Contrast Edition */
        .chat-message {
            position: relative;
            
            /* Heavily darkened semi-opaque tint for premium contrast over bright gameplay */
            background: linear-gradient(
                135deg, 
                rgba(12, 13, 20, 0.88) 0%, 
                rgba(5, 5, 10, 0.94) 100%
            );
            
            /* Micro-textured procedural grain overlay */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='glassNoise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23glassNoise)' opacity='0.025'/%3E%3C/svg%3E");
            
            will-change: transform;
            transform: translateZ(0);
            
            padding: 12px 24px 12px 26px;
            border-radius: 26px; 
            
            /* Enhanced 3D rim highlights that pop beautifully on the darker background */
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-top: 1.8px solid rgba(255, 255, 255, 0.48);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            
            /* Reinforced multi-layered shadow stack */
            box-shadow: 
                inset 0 12px 16px rgba(255, 255, 255, 0.14), 
                inset 0 -8px 14px rgba(0, 0, 0, 0.5),       
                inset 0 1px 1px rgba(255, 255, 255, 0.3),     
                0 24px 45px rgba(0, 0, 0, 0.7),
                0 6px 16px rgba(0, 0, 0, 0.5);              
                
            line-height: 1.5;
            word-break: break-word;
            overflow: hidden;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* Top Specular Lens Gloss Dynamic Overlay */
        .chat-message::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: linear-gradient(
                to bottom, 
                rgba(255, 255, 255, 0.14) 0%, 
                rgba(255, 255, 255, 0.02) 90%,
                rgba(255, 255, 255, 0) 100%
            );
            border-radius: 26px 26px 4px 4px;
            pointer-events: none;
            z-index: 1;
        }

        /* Left Side Vibrant Accent Node */
        .chat-side-pill {
            position: absolute;
            left: 6px;
            top: 14px;
            bottom: 14px;
            width: 5px;
            border-radius: 10px;
            z-index: 2;
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.4);
        }

        .chat-message.new {
            animation: iOSAppIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Dynamic Color Node Map */
        .chat-message:nth-child(5n+1) .chat-side-pill { background: #ff3399; box-shadow: 0 0 8px #ff3399; }
        .chat-message:nth-child(5n+2) .chat-side-pill { background: #ffaa00; box-shadow: 0 0 8px #ffaa00; }
        .chat-message:nth-child(5n+3) .chat-side-pill { background: #00bfff; box-shadow: 0 0 8px #00bfff; }
        .chat-message:nth-child(5n+4) .chat-side-pill { background: #00e676; box-shadow: 0 0 8px #00e676; }
        .chat-message:nth-child(5n+5) .chat-side-pill { background: #ff1744; box-shadow: 0 0 8px #ff1744; }

        /* Structural text shadows optimized for complete isolation */
        .author {
            font-weight: 800;
            font-size: 15px;
            letter-spacing: 0.3px;
            margin-right: 6px;
            position: relative;
            z-index: 2;
            text-shadow: 
                0 2px 3px rgba(0, 0, 0, 1), 
                0 4px 8px rgba(0, 0, 0, 0.95),
                0 0 4px rgba(0, 0, 0, 0.8);
        }

        /* Fluid Nickname Accent Adjustments */
        .chat-message:nth-child(5n+1) .author { color: #ff55bb; }
        .chat-message:nth-child(5n+2) .author { color: #ffb711; }
        .chat-message:nth-child(5n+3) .author { color: #11d4ff; }
        .chat-message:nth-child(5n+4) .author { color: #11ff99; }
        .chat-message:nth-child(5n+5) .author { color: #ff4466; }

        .msg-text {
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.1px;
            position: relative;
            z-index: 2;
            text-shadow: 
                0 2px 3px rgba(0, 0, 0, 1), 
                0 4px 9px rgba(0, 0, 0, 0.95),
                0 0 5px rgba(0, 0, 0, 0.85);
        }

        /* Darkened Active Status Dashboard Strip */
        #running-cmd {
            display: none;
            background: linear-gradient(135deg, rgba(12, 13, 20, 0.9) 0%, rgba(5, 5, 10, 0.96) 100%);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='cmdNoise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23cmdNoise)' opacity='0.02'/%3E%3C/svg%3E");
            will-change: transform;
            transform: translateZ(0);
            padding: 12px 22px;
            font-weight: 700;
            font-size: 14px;
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                inset 0 10px 12px rgba(255, 255, 255, 0.14),
                inset 0 -6px 10px rgba(0, 0, 0, 0.45),
                0 22px 38px rgba(0, 0, 0, 0.65);
            letter-spacing: 0.5px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 1);
            animation: gelPulse 3s ease-in-out infinite;
        }

        #running-cmd::before {
            content: "⚡ RUNNING: ";
            font-weight: 800;
            color: #ffeb3b;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.9);
        }

        @keyframes iOSAppIn {
            from { 
                opacity: 0; 
                transform: translateY(20px) scale(0.95);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1);
            }
        }

        @keyframes gelPulse {
            0%, 100% { transform: scale(1); opacity: 0.95; }
            50%       { transform: scale(1.01); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="messages-list"></div>
        <div id="running-cmd"></div>
    </div>

    <script>
        async function refresh() {
            try {
                const res = await fetch('overlay.json?v=' + Date.now(), {
                    cache: "no-store",
                    headers: { 'Cache-Control': 'no-cache' }
                });
                if (!res.ok) return;
                const data = await res.json();
                if (!data?.chat) return;

                const cmdEl = document.getElementById('running-cmd');
                if (data.running_command) {
                    cmdEl.textContent = data.running_command;
                    cmdEl.style.display = 'block';
                } else {
                    cmdEl.style.display = 'none';
                }

                const list = document.getElementById('messages-list');
                const currentIds = new Set();

                data.chat.forEach(msg => {
                    const id = msg.id;
                    currentIds.add(id);

                    let el = document.getElementById(id);
                    if (!el) {
                        el = document.createElement('div');
                        el.className = 'chat-message new';
                        el.id = id;
                        el.innerHTML = `
                            <div class="chat-side-pill"></div>
                            <span class="author">${escapeHtml(msg.author)}:</span> 
                            <span class="msg-text">${escapeHtml(msg.message)}</span>
                        `;
                        list.appendChild(el);
                        setTimeout(() => el.classList.remove('new'), 400);
                    } else {
                        const authorSpan = el.querySelector('.author');
                        const textSpan = el.querySelector('.msg-text');
                        if (authorSpan.textContent !== msg.author + ':') authorSpan.textContent = msg.author + ':';
                        if (textSpan.textContent !== msg.message) textSpan.textContent = msg.message;
                    }
                });

                Array.from(list.children).forEach(child => {
                    if (!currentIds.has(child.id)) child.remove();
                });

            } catch (e) {
                console.error("Refresh error:", e);
            }
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        setInterval(refresh, 400);
        refresh();
    </script>
</body>
</html>
